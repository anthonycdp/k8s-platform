apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: production
  labels:
    app: worker-service
    version: v1.0.0
    tier: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: worker-service
        version: v1.0.0
    spec:
      serviceAccountName: worker-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: worker
        image: worker-service:1.0.0
        imagePullPolicy: Always
        ports:
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: QUEUE_URL
          valueFrom:
            secretKeyRef:
              name: worker-secrets
              key: QUEUE_URL
        - name: WORKER_CONCURRENCY
          valueFrom:
            configMapKeyRef:
              name: worker-config
              key: CONCURRENCY
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -f /tmp/worker-ready
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - name: work-dir
          mountPath: /tmp/work
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: work-dir
        emptyDir:
          sizeLimit: 1Gi
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker-sa
  namespace: production
  labels:
    app: worker-service
automountServiceAccountToken: false
