# Blue-Green Deployment with Traditional Kubernetes Services
# Alternative approach without Argo Rollouts

---
# Blue Service (Current Production)
apiVersion: v1
kind: Service
metadata:
  name: api-server-blue
  namespace: platform
  labels:
    app: api-server
    slot: blue
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: api-server
    slot: blue
---
# Green Service (New Version)
apiVersion: v1
kind: Service
metadata:
  name: api-server-green
  namespace: platform
  labels:
    app: api-server
    slot: green
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: api-server
    slot: green
---
# Active Service (Points to current active slot)
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: platform
  labels:
    app: api-server
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: api-server
    slot: blue  # Change to 'green' to switch traffic
---
# Blue Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server-blue
  namespace: platform
  labels:
    app: api-server
    slot: blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-server
      slot: blue
  template:
    metadata:
      labels:
        app: api-server
        slot: blue
    spec:
      containers:
        - name: api-server
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
# Green Deployment (Initially scaled to 0)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server-green
  namespace: platform
  labels:
    app: api-server
    slot: green
spec:
  replicas: 0  # Scale up for deployment, then switch service
  selector:
    matchLabels:
      app: api-server
      slot: green
  template:
    metadata:
      labels:
        app: api-server
        slot: green
    spec:
      containers:
        - name: api-server
          image: nginx:1.28-alpine  # New version
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
