# Argo Rollouts - Blue-Green Deployment Strategy
# Zero-downtime deployments with instant traffic switching

---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api-server
  namespace: platform
  labels:
    app: api-server
    app.kubernetes.io/name: api-server
    deployment.strategy: blue-green
spec:
  replicas: 3
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api-server
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20

  # Blue-Green Strategy Configuration
  strategy:
    blueGreen:
      # Active service that receives production traffic
      activeService: api-server

      # Preview service for testing before promotion
      previewService: api-server-preview

      # Auto-promote after specified duration (optional)
      # autoPromotionEnabled: true
      # autoPromotionSeconds: 600  # 10 minutes

      # Pre-promotion analysis
      prePromotionAnalysis:
        templates:
          - templateName: pre-promotion-checks
        args:
          - name: service-name
            value: api-server-preview

      # Post-promotion analysis
      postPromotionAnalysis:
        templates:
          - templateName: post-promotion-checks
        args:
          - name: service-name
            value: api-server

      # Keep preview service available after promotion for rollback
      scaleDownDelaySeconds: 600  # 10 minutes

      # Anti-affinity for spreading across nodes
      antiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: api-server
            topologyKey: kubernetes.io/hostname
---
# Analysis Template for Pre-Promotion
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: pre-promotion-checks
  namespace: platform
spec:
  args:
    - name: service-name
  metrics:
    - name: health-check
      count: 1
      provider:
        web:
          url: "http://{{args.service-name}}.platform.svc.cluster.local/health"
          headers:
            - key: Accept
              value: application/json
          jsonPath: "{$.status}"
      successCondition: result == "healthy"
    - name: success-rate
      interval: 1m
      count: 3
      successCondition: result[0] >= 0.99
      provider:
        prometheus:
          address: http://prometheus-platform:9090
          query: |
            sum(rate(http_requests_total{service="{{args.service-name}}",status!~"5.."}[1m])) /
            sum(rate(http_requests_total{service="{{args.service-name}}"}[1m]))
---
# Analysis Template for Post-Promotion
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: post-promotion-checks
  namespace: platform
spec:
  args:
    - name: service-name
  metrics:
    - name: error-rate
      interval: 1m
      count: 5
      successCondition: result[0] <= 0.01  # Less than 1% error rate
      provider:
        prometheus:
          address: http://prometheus-platform:9090
          query: |
            sum(rate(http_requests_total{service="{{args.service-name}}",status=~"5.."}[1m])) /
            sum(rate(http_requests_total{service="{{args.service-name}}"}[1m]))
---
# Preview Service (for Blue-Green)
apiVersion: v1
kind: Service
metadata:
  name: api-server-preview
  namespace: platform
  labels:
    app: api-server
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: api-server
