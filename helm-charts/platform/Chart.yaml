apiVersion: v2
name: platform
description: A production-ready Kubernetes platform with autoscaling, observability, and GitOps

type: application
version: 1.0.0
appVersion: "1.0.0"

kubeVersion: ">=1.28.0-0"

home: https://github.com/example/platform
sources:
  - https://github.com/example/platform

maintainers:
  - name: Platform Team
    email: platform@example.com

keywords:
  - kubernetes
  - platform
  - microservices
  - gitops
  - autoscaling

annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/signKey: |
    fingerprint: ""
    url: ""

dependencies:
  - name: prometheus
    version: "25.x.x"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: grafana
    version: "7.x.x"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
