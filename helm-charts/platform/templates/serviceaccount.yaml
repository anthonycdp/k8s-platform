{{- if .Values.apiServer.enabled }}
{{- if .Values.apiServer.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "platform.serviceAccountName" . }}
  labels:
    {{- include "platform.apiServer.labels" . | nindent 4 }}
  {{- with .Values.apiServer.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.apiServer.serviceAccount.automountServiceAccountToken | default false }}
{{- end }}
{{- end }}
