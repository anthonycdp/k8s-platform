{{- if and .Values.apiServer.enabled .Values.apiServer.autoscaling.enabled }}
apiVersion: {{ include "platform.hpa.apiVersion" . }}
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "platform.fullname" . }}-api-server-hpa
  labels:
    {{- include "platform.apiServer.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "platform.fullname" . }}-api-server
  minReplicas: {{ .Values.apiServer.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.apiServer.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.apiServer.autoscaling.targetCPUUtilizationPercentage }}
    {{- if .Values.apiServer.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.apiServer.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
    {{- with .Values.apiServer.autoscaling.customMetrics }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if .Values.apiServer.autoscaling.behavior }}
  behavior:
    {{- toYaml .Values.apiServer.autoscaling.behavior | nindent 4 }}
  {{- end }}
{{- end }}
---
{{- if and .Values.frontend.enabled .Values.frontend.autoscaling.enabled }}
apiVersion: {{ include "platform.hpa.apiVersion" . }}
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "platform.fullname" . }}-frontend-hpa
  labels:
    {{- include "platform.frontend.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "platform.fullname" . }}-frontend
  minReplicas: {{ .Values.frontend.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.frontend.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.frontend.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
