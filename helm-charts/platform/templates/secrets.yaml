{{- if .Values.apiServer.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "platform.fullname" . }}-secrets
  labels:
    {{- include "platform.apiServer.labels" . | nindent 4 }}
type: Opaque
# NOTE: This is a placeholder. Use external secrets management in production!
# Consider: External Secrets Operator, Sealed Secrets, HashiCorp Vault
data:
  {{- range .Values.apiServer.envSecrets }}
  {{ .secretKey }}: {{ "PLACEHOLDER_CHANGE_ME" | b64enc }}
  {{- end }}
{{- end }}
