{{- if and .Values.apiServer.enabled .Values.apiServer.metrics.enabled .Values.prometheus.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "platform.fullname" . }}-api-server
  labels:
    {{- include "platform.apiServer.labels" . | nindent 4 }}
    {{- with .Values.prometheus.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "platform.apiServer.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      path: {{ .Values.apiServer.metrics.path }}
      interval: {{ .Values.prometheus.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.prometheus.serviceMonitor.scrapeTimeout }}
{{- end }}
