{{- if .Values.apiServer.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "platform.fullname" . }}-test-connection"
  labels:
    {{- include "platform.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['{{ include "platform.fullname" . }}-api-server:{{ .Values.apiServer.service.port }}/health']
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "platform.fullname" . }}-test-metrics"
  labels:
    {{- include "platform.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ['curl']
      args:
        - '-f'
        - 'http://{{ include "platform.fullname" . }}-api-server:{{ .Values.apiServer.metrics.port }}{{ .Values.apiServer.metrics.path }}'
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
{{- end }}
