apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform.fullname" . }}-config
  labels:
    {{- include "platform.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.apiServer.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform.fullname" . }}-nginx-config
  labels:
    {{- include "platform.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen {{ .Values.apiServer.env.PORT | default 8080 }};
        server_name _;

        root /var/www/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied any;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

        location / {
            try_files $uri $uri/ =404;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        {{- if .Values.apiServer.metrics.enabled }}
        location {{ .Values.apiServer.metrics.path }} {
            access_log off;
            return 200 "# HELP dummy_metric A dummy metric\n# TYPE dummy_metric counter\ndummy_metric 1\n";
            add_header Content-Type text/plain;
        }
        {{- end }}
    }
