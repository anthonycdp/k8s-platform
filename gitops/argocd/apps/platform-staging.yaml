apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: platform
    app.kubernetes.io/component: gitOps
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/example/platform.git
    targetRevision: staging
    path: k8s/overlays/staging
    kustomize:
      namePrefix: staging-

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m

  info:
    - name: Environment
      value: Staging
